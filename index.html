<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DS Requests from Valitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;padding:24px}
h1{font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:3px}
.subtitle{color:#64748b;font-size:0.8rem;margin-bottom:24px}
.card{background:#1e2130;border:1px solid #2d3748;border-radius:12px;padding:18px 20px;margin-bottom:20px}
.uptime-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.uptime-label{font-size:14px;font-weight:500;color:#e2e8f0}
.badge{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px}
.bg{background:#065f46;color:#6ee7b7}.br{background:#7f1d1d;color:#fca5a5}
.bar-wrap{position:relative}
.uptime-bar{display:flex;gap:2px;height:36px;align-items:stretch}
.seg{flex:1;border-radius:3px;cursor:pointer;transition:opacity 0.1s;min-width:0;position:relative}
.seg:hover{filter:brightness(1.2)}
.uptime-bar{overflow:visible}
.cnt-badge{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#fca5a5;white-space:nowrap;pointer-events:none;line-height:1;letter-spacing:0}
.bar-labels{display:flex;justify-content:space-between;margin-top:6px}
.bar-labels span{font-size:11px;color:#475569}
.uptime-pct{margin-top:6px;font-size:13px;color:#94a3b8;min-height:36px}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid #2d3748}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b}
.ld{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.tip{display:none;position:absolute;bottom:44px;background:#1e2130;border:1px solid #374151;border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;white-space:nowrap;z-index:10;color:#e2e8f0}
.panel-clean{background:#064e3b22;border:1px solid #064e3b88;border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.panel-red{background:#7f1d1d22;border:1px solid #7f1d1d66;border-radius:8px;padding:14px 16px}
.panel-red-title{color:#f87171;font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid #3d1f1f}
th{text-align:left;padding:6px 10px;color:#7f3f3f;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.04em}
tbody tr{border-bottom:1px solid #2a1515}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#2a1a1a44}
td{padding:8px 10px}
.t-date{color:#94a3b8;font-size:11px}
.t-time{font-family:monospace;color:#e2e8f0;font-size:12px}
.t-dur{color:#fca5a5;font-weight:600}
.t-tag{display:inline-block;font-size:9px;background:#7f1d1d55;color:#fca5a5;padding:1px 7px;border-radius:10px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.sc{background:#1e2130;border:1px solid #2d3748;border-radius:10px;padding:14px;min-height:90px}
.sl{font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.sv{font-size:1.6rem;font-weight:700;color:#fff}
.sv.g{color:#34d399}.sv.r{color:#f87171}
.footer{text-align:center;color:#334155;font-size:11px;margin-top:18px}
.loading{color:#475569;font-size:13px;padding:20px;text-align:center}
.err{color:#f87171;font-size:13px;padding:20px}
.bm{background:#92400e;color:#fcd34d}
.panel-amber{background:#78350f22;border:1px solid #92400e66;border-radius:8px;padding:14px 16px}
.panel-amber-title{color:#fbbf24;font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.type-btn{font-size:10px;padding:2px 9px;border-radius:10px;cursor:pointer;border:none;font-weight:600;transition:all 0.15s;line-height:18px}
.type-fault{background:#7f1d1d55;color:#fca5a5}.type-fault:hover{background:#7f1d1d99}
.type-maint{background:#78350f88;color:#fcd34d}.type-maint:hover{background:#78350fbb}
tbody tr.maint-row td{opacity:0.7}
tbody tr.maint-row{background:#78350f18}
.maint-note{font-size:10px;color:#64748b;margin-top:10px;text-align:right}
</style>
</head>
<body>
<h1>3DS Requests from Valitor</h1>

<div class="card">
  <div class="uptime-header">
    <span class="uptime-label">3DS Requests from Valitor</span>
    <span class="badge" id="sBadge">—</span>
  </div>
  <div class="bar-wrap">
    <div class="uptime-bar" id="uBar"><div class="loading">Loading…</div></div>
    <div class="tip" id="bTip"></div>
  </div>
  <div class="bar-labels"><span id="barStart">—</span><span>Today</span></div>
  <div class="uptime-pct" id="uPct"></div>
  <div class="legend">
    <div class="li"><div class="ld" style="background:#1d9e75"></div>Clean</div>
    <div class="li"><div class="ld" style="background:#e24b4a"></div>Outage (technical fault)</div>
    <div class="li"><div class="ld" style="background:#d97706"></div>Maintenance (excluded from uptime)</div>
    <div class="li"><div class="ld" style="background:#2d3748;border:1px solid #374151"></div>No data</div>
  </div>
</div>

<div class="card" id="iPanel"><div class="loading">Loading…</div></div>

<div class="stats">
  <div class="sc"><div class="sl">Monitored Days</div><div class="sv" id="s1">—</div><div style="font-size:11px;color:#475569;margin-top:3px" id="s1b"></div></div>
  <div class="sc"><div class="sl">Outage Minutes</div><div class="sv" id="s2">—</div><div style="font-size:11px;color:#475569;margin-top:3px" id="s2b"></div></div>
  <div class="sc"><div class="sl">Uptime</div><div class="sv" id="s3">—</div><div style="font-size:11px;color:#475569;margin-top:3px">Minute-level precision</div></div>
</div>

<div class="footer" id="footer">Devops SRE · Valitor 3DS · Outage = 0 req/min</div>

<script>
// ── GitHub token (entered once, stored per-browser for auth only) ──────────
const TOKEN_KEY='valitor_gh_token';
function getToken(){return localStorage.getItem(TOKEN_KEY)||'';}

// ── isMaint: reads from in-memory data (source of truth = data.json) ───────
function isMaint(date,start,end){
  for(const d of(window._DAILY||[]))
    if(d.date===date)
      for(const g of(d.gaps||[]))
        if(g.start===start&&g.end===end) return!!g.maintenance;
  return false;
}

// ── UTF-8-safe base64 helpers for GitHub API ──────────────────────────────
function b64enc(str){
  const b=new TextEncoder().encode(str);let s='';
  b.forEach(c=>s+=String.fromCharCode(c));return btoa(s);
}
function b64dec(str){
  const bin=atob(str),b=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(b);
}

// ── Toggle maintenance flag — pushes to GitHub, shared with all viewers ────
async function toggleMaint(date,start,end,btnEl){
  let token=getToken();
  if(!token){
    token=(prompt('Enter a GitHub token with write access to rapyd-status\n(entered once, saved in this browser):')||'').trim();
    if(!token)return;
    localStorage.setItem(TOKEN_KEY,token);
  }
  const orig=btnEl.innerHTML;
  btnEl.innerHTML='⏳';btnEl.disabled=true;
  try{
    // 1 — fetch current data.json + SHA from GitHub API (always fresh, bypasses CDN)
    const getR=await fetch('https://api.github.com/repos/barakz-stack/rapyd-status/contents/data.json',
      {headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json'}});
    if(!getR.ok){
      if(getR.status===401||getR.status===403){localStorage.removeItem(TOKEN_KEY);alert('Token invalid or expired — please re-enter next time.');}
      else alert('GitHub API error: '+getR.status);
      btnEl.innerHTML=orig;btnEl.disabled=false;return;
    }
    const info=await getR.json();
    const sha=info.sha;
    const data=JSON.parse(b64dec(info.content.replace(/\n/g,'')));

    // 2 — toggle flag on the matching gap in both `daily` and `days`; capture new state
    let newMaint=false;
    for(const arr of[data.daily,data.days])
      for(const d of(arr||[]))
        if(d.date===date)
          for(const g of(d.gaps||[]))
            if(g.start===start&&g.end===end){
              if(g.maintenance){delete g.maintenance;}else{g.maintenance=true;}
              if(arr===data.daily)newMaint=!!g.maintenance;
            }

    // 3 — push updated data.json
    const putR=await fetch('https://api.github.com/repos/barakz-stack/rapyd-status/contents/data.json',{
      method:'PUT',
      headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Toggle maintenance: '+date+' '+start+'-'+end,content:b64enc(JSON.stringify(data)),sha})
    });
    if(!putR.ok){alert('Push failed: '+putR.status);btnEl.innerHTML=orig;btnEl.disabled=false;return;}

    // 4 — update in-memory data; surgically patch only the affected segment + row
    window._D40=data.days;window._DAILY=data.daily;
    patchSeg(date);
    const{faultMin}=renderStats(data.days,data.daily,window._genDate);
    patchRow(date,start,end,faultMin,newMaint);
  }catch(e){alert('Error: '+e.message);btnEl.innerHTML=orig;btnEl.disabled=false;}
}

// ── Bar segment style — Option 3: intensity fill + count badge ───────────────
function segFaultCount(d){
  if(!d.hasData||!d.gapMinutes)return 0;
  return d.gaps.filter(g=>!isMaint(d.date,g.start,g.end)).length;
}
function segMaintCount(d){
  if(!d.hasData||!d.gapMinutes)return 0;
  return d.gaps.filter(g=>isMaint(d.date,g.start,g.end)).length;
}
function segStyle(d){
  if(!d.hasData)return{bg:'#2d3748',border:'1px solid #374151',opacity:1};
  if(!d.gapMinutes)return{bg:'#1d9e75',border:'none',opacity:1};
  const fc=segFaultCount(d),mc=segMaintCount(d);
  if(fc===0)return{bg:'#d97706',border:'none',opacity:1}; // all maintenance
  // intensity scales: 1→0.55, 2→0.70, 3→0.85, 4+→1.0
  const opacity=Math.min(0.55+(fc-1)*0.15,1.0);
  return{bg:'#e24b4a',border:'none',opacity};
}
function segTxt(d){
  if(!d.hasData)return'No data';
  if(!d.gapMinutes)return'✅ Clean';
  const fc=segFaultCount(d),mc=segMaintCount(d);
  let parts=[];
  if(fc)parts.push('🔴 '+fc+' fault'+(fc>1?'s':'')+' — '+d.gaps.filter(g=>!isMaint(d.date,g.start,g.end)).reduce((s,g)=>s+g.minutes,0)+' min');
  if(mc)parts.push('🟡 '+mc+' maintenance'+(mc>1?' events':'')+' — '+d.gaps.filter(g=>isMaint(d.date,g.start,g.end)).reduce((s,g)=>s+g.minutes,0)+' min');
  return parts.join(' · ');
}

// ── Uptime calculation (shared) ───────────────────────────────────────────────
function calcUptime(DAYS40,DAILY){
  const dataDays=DAYS40.filter(d=>d.hasData);
  const totalMin=dataDays.length*1440;
  const allGapMin=dataDays.reduce((s,d)=>s+d.gapMinutes,0);
  const maintMin=dataDays.reduce((s,d)=>s+d.gaps.filter(g=>isMaint(d.date,g.start,g.end)).reduce((gs,g)=>gs+g.minutes,0),0);
  const faultMin=allGapMin-maintMin;
  const pct=totalMin>0?((totalMin-faultMin)/totalMin*100).toFixed(3):'—';
  return{dataDays,maintMin,faultMin,pct};
}

// ── Apply visual style to a single segment element ───────────────────────────
function applySegStyle(seg,d){
  const st=segStyle(d);
  seg.style.background=st.bg;
  seg.style.opacity=st.opacity;
  seg.style.border=st.border||'';
  const existing=seg.querySelector('.cnt-badge');
  if(existing)existing.remove();
  const fc=segFaultCount(d);
  if(fc>=2){
    const badge=document.createElement('span');
    badge.className='cnt-badge';
    badge.textContent='×'+fc;
    seg.appendChild(badge);
  }
}

// ── Bar rendering — called once on init, tooltips look up live data ───────────
function renderBar(DAYS40){
  const bar=document.getElementById('uBar'),tip=document.getElementById('bTip');
  bar.innerHTML='';
  DAYS40.forEach(d=>{
    const seg=document.createElement('div');
    seg.className='seg';
    seg.id='seg-'+d.date;
    applySegStyle(seg,d);
    seg.addEventListener('mouseenter',function(){
      const live=window._D40.find(x=>x.date===d.date)||d;
      const st=segStyle(live);
      tip.style.display='block';
      tip.innerHTML=`<b style="color:#e2e8f0">${live.date}</b><br><span style="color:${st.bg}">${segTxt(live)}</span>`;
      const sr=this.getBoundingClientRect(),br=bar.getBoundingClientRect();
      tip.style.left=Math.max(0,Math.min(sr.left-br.left+sr.width/2-tip.offsetWidth/2,br.width-tip.offsetWidth))+'px';
    });
    seg.addEventListener('mouseleave',()=>{tip.style.display='none';});
    bar.appendChild(seg);
  });
}

// ── Patch one bar segment in-place after toggle (no bar rebuild) ──────────────
function patchSeg(date){
  const seg=document.getElementById('seg-'+date);
  if(!seg)return;
  const d=window._D40.find(x=>x.date===date);
  if(d)applySegStyle(seg,d);
}

// ── Stats + badge + footer update (no panel/table touch) ─────────────────────
function renderStats(DAYS40,DAILY,genDate){
  const{dataDays,maintMin,faultMin,pct}=calcUptime(DAYS40,DAILY);
  document.getElementById('uPct').innerHTML=
    pct+'% uptime &nbsp;·&nbsp; '+dataDays.length+' days with data out of '+DAYS40.length+' in window'
    +'<br><span style="font-size:11px;color:'+(maintMin>0?'#92400e':'transparent')+'">'
    +(maintMin>0?maintMin+' min maintenance excluded from uptime calculation':'&nbsp;')
    +'</span>';
  if(genDate)document.getElementById('footer').textContent='Generated: '+genDate+' · Devops SRE · Valitor 3DS · Outage = 0 req/min';
  const badge=document.getElementById('sBadge');
  if(faultMin>0){badge.className='badge br';badge.textContent='Outage detected';}
  else if(maintMin>0){badge.className='badge bm';badge.textContent='Maintenance';}
  else{badge.className='badge bg';badge.textContent='Operational';}
  document.getElementById('s2').textContent=faultMin;
  document.getElementById('s2').className='sv '+(faultMin>0?'r':'g');
  document.getElementById('s2b').innerHTML=
    (faultMin===0?'No faults detected':faultMin+' min fault downtime')
    +'<br><span style="color:'+(maintMin>0?'#92400e':'transparent')+'">'
    +(maintMin>0?maintMin+' min maintenance':'&nbsp;')+'</span>';
  document.getElementById('s3').textContent=pct+'%';
  document.getElementById('s3').className='sv '+(faultMin===0?'g':'r');
  return{faultMin,maintMin};
}

// ── Row ID helper ─────────────────────────────────────────────────────────────
function rowId(date,start,end){return'r-'+date+'-'+start.replace(/:/g,'')+'-'+end.replace(/:/g,'');}

// ── Patch one row + panel header after toggle (zero table rebuild) ────────────
function patchRow(date,start,end,faultMin,m){
  const row=document.getElementById(rowId(date,start,end));
  if(row){
    row.className=m?'maint-row':'';
    row.cells[3].style.color=m?'#fbbf24':'';
    row.cells[4].innerHTML=m?'<span class="t-tag" style="background:#78350f55;color:#fcd34d">maintenance</span>':'';
    const btn=row.cells[5].querySelector('.type-btn');
    if(btn){btn.className='type-btn '+(m?'type-maint':'type-fault');btn.innerHTML=m?'🟡 Maintenance':'🔴 Fault';btn.disabled=false;}
  }
  const wrap=document.getElementById('panelWrap'),title=document.getElementById('panelTitle');
  if(wrap&&title){
    const faultEvts=document.querySelectorAll('#iPanel tbody tr:not(.maint-row)').length;
    wrap.className=faultMin>0?'panel-red':'panel-amber';
    title.className=faultMin>0?'panel-red-title':'panel-amber-title';
    title.innerHTML=faultMin>0
      ?`<span>🔴</span><span>${faultEvts} fault event${faultEvts!==1?'s':''}</span>`
      :`<span>🟡</span><span>All events marked as maintenance</span>`;
  }
}

// ── Build events panel HTML — called once on init only ────────────────────────
function renderPanel(DAYS40,DAILY){
  const allEvents=[];
  for(const d of DAILY)
    for(const g of(d.gaps||[]))
      allEvents.push({date:d.date,start:g.start,end:g.end,mins:g.minutes,maint:isMaint(d.date,g.start,g.end)});
  allEvents.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
  const{dataDays,faultMin}=calcUptime(DAYS40,DAILY);
  const panel=document.getElementById('iPanel');
  if(!allEvents.length){
    panel.innerHTML=`<div class="panel-clean"><span style="font-size:20px;color:#34d399">✓</span><div>
      <div style="font-size:13px;font-weight:500;color:#34d399">Fully operational</div>
      <div style="font-size:11px;color:#475569;margin-top:2px">All ${(dataDays.length*1440).toLocaleString()} monitored minutes had traffic.</div>
    </div></div>`;
    return;
  }
  const faultEvents=allEvents.filter(e=>!e.maint);
  const longest=faultEvents.length?faultEvents.reduce((a,b)=>b.mins>a.mins?b:a,faultEvents[0]):null;
  const rows=allEvents.map(e=>{
    const m=e.maint;
    const tag=m?'<span class="t-tag" style="background:#78350f55;color:#fcd34d">maintenance</span>'
                :(e===longest?'<span class="t-tag">longest</span>':'');
    const btn=m
      ?`<button class="type-btn type-maint" onclick="toggleMaint('${e.date}','${e.start}','${e.end}',this)">🟡 Maintenance</button>`
      :`<button class="type-btn type-fault" onclick="toggleMaint('${e.date}','${e.start}','${e.end}',this)">🔴 Fault</button>`;
    return`<tr id="${rowId(e.date,e.start,e.end)}" class="${m?'maint-row':''}">
      <td class="t-date">${e.date}</td>
      <td class="t-time">${e.start} UTC</td>
      <td class="t-time">${e.end} UTC</td>
      <td class="t-dur" style="${m?'color:#fbbf24':''}">${e.mins} min</td>
      <td>${tag}</td>
      <td>${btn}</td>
    </tr>`;
  }).join('');
  const panelTitle=faultMin>0
    ?`<span>🔴</span><span>${faultEvents.length} fault event${faultEvents.length!==1?'s':''}</span>`
    :`<span>🟡</span><span>All events marked as maintenance</span>`;
  panel.innerHTML=`<div id="panelWrap" class="${faultMin>0?'panel-red':'panel-amber'}">
    <div id="panelTitle" class="${faultMin>0?'panel-red-title':'panel-amber-title'}">${panelTitle}</div>
    <table>
      <thead><tr><th>Date</th><th>Start</th><th>End</th><th>Duration</th><th></th><th>Type</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="maint-note">Click the type button to toggle · Changes are shared with your team (GitHub token required on first use) · Others see changes after refreshing</div>
  </div>`;
}

// ── Main render — called once on init ────────────────────────────────────────
function render(DAYS40,DAILY,genDate){
  const dataDays=DAYS40.filter(d=>d.hasData);
  document.getElementById('barStart').textContent=DAYS40[0].date;
  document.getElementById('s1').textContent=dataDays.length;
  document.getElementById('s1b').textContent='Out of '+DAYS40.length+'-day window';
  renderBar(DAYS40);
  renderStats(DAYS40,DAILY,genDate);
  renderPanel(DAYS40,DAILY);
}

async function init(){
  let data;
  try{
    const r=await fetch('./data.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    data=await r.json();
  }catch(e){
    document.getElementById('uBar').innerHTML='<div class="err">Failed to load data.json: '+e.message+'</div>';
    document.getElementById('iPanel').innerHTML='<div class="err">Data unavailable.</div>';
    return;
  }
  window._D40=data.days;
  window._DAILY=data.daily;
  window._genDate=data.generatedDate;
  render(data.days,data.daily,data.generatedDate);
}

init();
</script>
</body>
</html>
